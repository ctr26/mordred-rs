name: Python Wheels

on:
  push:
    tags: ["v*"]

jobs:
  build-wheels:
    name: Build (${{ matrix.os }} / ${{ matrix.target }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.87"
      - run: pip install maturin
      - name: Build wheels (aarch64)
        if: matrix.target == 'aarch64'
        run: cd mordred-py && maturin build --release --target ${{ matrix.os == 'ubuntu-latest' && 'aarch64-unknown-linux-gnu' || 'aarch64-apple-darwin' }}
      - name: Build wheels (x86_64)
        if: matrix.target == 'x86_64'
        run: cd mordred-py && maturin build --release
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: mordred-py/target/wheels/*.whl

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
